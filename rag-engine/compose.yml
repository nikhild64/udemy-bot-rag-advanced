version: '3.8'

services:
  qdrant:
    image: qdrant/qdrant:latest
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:6333/readyz"]
      interval: 5s
      timeout: 3s
      retries: 5

  rag-engine:
    build:
      context: .
      target: runtime
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - LOG_LEVEL=info
      - CHAT_PROVIDER=mistral
      - MISTRAL_API_KEY=${MISTRAL_API_KEY:-}
      - QDRANT_URL=http://qdrant:6333
      - QDRANT_API_KEY=${QDRANT_API_KEY:-}
      - CHAT_MODEL=mistral-medium-latest
      - QUERY_TRANSFORMATION_MODEL=mistral-small-latest
      - RERANK_MODEL=mistral-small-latest
    depends_on:
      qdrant:
        condition: service_healthy

volumes:
  qdrant_data:
